<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <base href="/FacialPalsyPath/"> -->
    <title>Understanding Facial Paralysis</title>
    <link rel="icon" type="image/x-icon" href="icons/FacialPalsyPathLogo.png">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
<div data-include="components/header.html"></div>

<main>
<section class="page-header">
    <h1>Understanding Facial Paralysis</h1>
    <p class="header-description">Explore an overview of facial paralysis and what it might mean for you.</p>
</section>

<!-- Lightbox Modal -->
<div class="lightbox-modal" id="lightboxModal">
    <div class="lightbox-content">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
    </div>
</div>

<button onclick="topFunction()" id="myBtn" title="Go to top">
    <img src="icons/TopOfPageArrow.png" alt="icon of an arrow pointing to the top of the page." style="width:20px;height:20px;">Top of Page</button>

<div data-include="components/footer.html"></div>

<script>
let mybutton = document.getElementById("myBtn");
window.onscroll = function() {scrollFunction()};
function scrollFunction() {
if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
    mybutton.style.display = "block";
} else {
    mybutton.style.display = "none";
}
}
function topFunction() {
document.documentElement.scrollTop = 0;
document.body.scrollTop = 0;
}

</script>
</body>
</html>
